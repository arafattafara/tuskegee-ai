<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tuskegee AI Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; }
    textarea { width: 100%; height: 90px; padding: 10px; }
    button { padding: 10px 20px; margin-top: 10px; }
    pre { background: #f4f4f4; padding: 15px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Tuskegee AI Assistant</h1>

  <textarea id="q" placeholder="Ask a question about Tuskegee University"></textarea>
  <br>
  <button onclick="ask()">Ask</button>

  <h3>Answer</h3>
  <pre id="out">Ready.</pre>

  <script>
    const API_URL = "https://chat-l4rexhru5q-uc.a.run.app";

    async function ask() {
      const question = document.getElementById("q").value.trim();
      const out = document.getElementById("out");

      if (!question) {
        out.textContent = "Please type a question.";
        return;
      }

      out.textContent = "Thinking...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        const text = await response.text();

        try {
          const data = JSON.parse(text);
          out.textContent = data.answer || data.error || text;
        } catch {
          out.textContent = text;
        }

      } catch (error) {
        out.textContent = "Frontend error: " + error.message;
        console.error(error);
      }
    }
  </script>
</body>
</html>
